schemaId: "builtin:anomaly-detection.metric-events"
schemaVersion: 1.0.19
scope: environment
value:
  # DISABLED: this instance is running in standalone mode (redis_cluster_enabled=0).
  # Enable this alert only after cluster mode is configured in valkey.conf.
  # When cluster is active and healthy, redis_cluster_enabled = 1.
  # If the cluster loses quorum or enters a fail state, this metric drops to 0.
  # For finer-grained cluster health, replace the metricSelector with a dedicated
  # cluster-state metric if your exporter version exposes one (e.g. redis_cluster_info).
  enabled: false
  eventTemplate:
    davisMerge: false
    description: "Valkey cluster is no longer reporting a healthy state on {dims:host}. The cluster may have lost quorum or entered fail state. Immediate investigation required."
    eventType: AVAILABILITY
    metadata: []
    title: "Valkey: Cluster degraded (cluster_state != ok)"
  modelProperties:
    alertCondition: BELOW
    alertOnNoData: false
    dealertingSamples: 3
    samples: 3
    threshold: 1
    type: STATIC_THRESHOLD
    violatingSamples: 2
  queryDefinition:
    metricSelector: "redis_cluster_enabled:splitBy()"
    type: METRIC_SELECTOR
  summary: "Valkey: Cluster degraded (cluster_state != ok)"
