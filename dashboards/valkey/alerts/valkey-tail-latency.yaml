schemaId: "builtin:anomaly-detection.metric-events"
schemaVersion: 1.0.19
scope: environment
value:
  enabled: true
  eventTemplate:
    davisMerge: false
    description: "Valkey p99 command latency has exceeded 1ms (1000 µs) for the '{dims:cmd}' command on {dims:host}. This may indicate slow commands, memory pressure causing eviction cycles, or I/O saturation. Current p99: {severity} µs."
    eventType: SLOWDOWN
    metadata: []
    title: "Valkey: Tail latency spike — p99 >1ms ({dims:cmd})"
  modelProperties:
    alertCondition: ABOVE
    alertOnNoData: false
    dealertingSamples: 5
    samples: 5
    # Metric is in microseconds; 1ms = 1000 µs
    threshold: 1000
    type: STATIC_THRESHOLD
    violatingSamples: 3
  queryDefinition:
    # redis_latency_percentiles_usec is a Prometheus summary; filter to quantile=99, split by command
    metricSelector: "redis_latency_percentiles_usec:filter(eq(\"quantile\",\"99\")):splitBy(\"cmd\")"
    type: METRIC_SELECTOR
  summary: "Valkey: Tail latency spike — p99 >1ms"
